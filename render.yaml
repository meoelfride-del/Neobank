services:
  - type: web
    name: neobank-api-meoelfride
    runtime: node
    plan: starter
    region: ohio
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    preDeployCommand: npm run bootstrap:admin
    healthCheckPath: /api/health
    disk:
      name: neobank-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/neobank.sqlite
      - key: CLIENT_URL
        value: https://neobank.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@neobank.app
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_PHONE
        value: +22900000000
