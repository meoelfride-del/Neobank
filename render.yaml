databases:
  - name: neobank-db
    plan: basic-256mb
    region: ohio
    databaseName: neobank
    user: neobank_app
    ipAllowList: []

services:
  - type: web
    name: neobank-api-meoelfride
    runtime: node
    plan: starter
    region: ohio
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    preDeployCommand: npm run bootstrap:admin
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: neobank-db
          property: connectionString
      - key: CLIENT_URL
        value: https://neobank-team-eig.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@neobank.app
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_PHONE
        value: +22900000000
